<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/admin/css/admin-ui.css">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #f5f7fb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            color: #0b1220;
        }

        .binder {
            position: relative;
            width: 880px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
            padding: 34px 36px 36px 72px;
        }

        /* Binder spring */
        .binder::before {
            content: "";
            position: absolute;
            top: 24px;
            left: 26px;
            width: 20px;
            height: calc(100% - 48px);
            background:
                repeating-linear-gradient(to bottom,
                    #2563eb,
                    #2563eb 10px,
                    transparent 10px,
                    transparent 18px);
            border-radius: 10px;
        }

        .binder::after {
            content: "";
            position: absolute;
            top: 24px;
            left: 33px;
            width: 6px;
            height: calc(100% - 48px);
            background: #ffffff;
        }

        .binder-header {
            margin-bottom: 26px;
        }

        .binder-header h1 {
            margin: 0;
            font-size: 24px;
        }

        .binder-header p {
            margin: 6px 0 0;
            font-size: 14px;
            color: #64748b;
        }

        .binder-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .binder-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 14px 18px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .binder-item:hover {
            background: #eef2ff;
            transform: translateX(4px);
        }

        .binder-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .binder-icon {
            font-size: 18px;
        }

        .binder-title {
            font-size: 15px;
            font-weight: 600;
        }

        .binder-desc {
            font-size: 13px;
            color: #64748b;
        }

        .binder-right {
            font-size: 18px;
            color: #94a3b8;
        }

        .logout {
            background: #fff5f5;
            border-color: #fecaca;
        }

        .logout:hover {
            background: #fee2e2;
        }

        @media (max-width: 768px) {
            .binder {
                width: 100%;
                margin: 0 14px;
            }
        }
    </style>
</head>

<body>

    <div class="binder">

        <div class="binder-header">
            <h1>Admin Dashboard</h1>
            <p>Welcome back, Admin 👋</p>
        </div>

        <div class="binder-list">

            <div class="binder-item" onclick="goCreate()">
                <div class="binder-left">
                    <div class="binder-icon">➕</div>
                    <div>
                        <div class="binder-title">Create Invoice</div>
                        <div class="binder-desc">Generate a new invoice for a client</div>
                    </div>
                </div>
                <div class="binder-right">›</div>
            </div>

            <div class="binder-item" onclick="goInvoices()">
                <div class="binder-left">
                    <div class="binder-icon">📄</div>
                    <div>
                        <div class="binder-title">View Invoices</div>
                        <div class="binder-desc">Browse and manage all invoices</div>
                    </div>
                </div>
                <div class="binder-right">›</div>
            </div>

            <div class="binder-item" onclick="goSettings()">
                <div class="binder-left">
                    <div class="binder-icon">⚙</div>
                    <div>
                        <div class="binder-title">App Settings</div>
                        <div class="binder-desc">Configure invoice and app preferences</div>
                    </div>
                </div>
                <div class="binder-right">›</div>
            </div>

            <div class="binder-item logout" onclick="logout()">
                <div class="binder-left">
                    <div class="binder-icon">🚪</div>
                    <div>
                        <div class="binder-title">Logout</div>
                        <div class="binder-desc">Sign out of admin panel</div>
                    </div>
                </div>
                <div class="binder-right">›</div>
            </div>

        </div>
    </div>

    <script>
        async function checkAuth() {
            const res = await fetch("/api/me", {
                credentials: "include"
            });

            if (!res.ok) {
                window.location.href = "/admin/login.html";
            }
        }

        function goCreate() {
            window.location.href = "/admin/create-invoice.html";
        }

        function goInvoices() {
            window.location.href = "/admin/invoices.html";
        }

        function goSettings() {
            window.location.href = "/admin/settings.html";
        }

        async function logout() {
            await fetch("/api/logout", {
                method: "POST",
                credentials: "include"
            });
            window.location.href = "/admin/login.html";
        }

        checkAuth();
    </script>

</body>

</html>
