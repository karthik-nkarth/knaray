<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/admin/css/admin-ui.css">
    <title>Invoices</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f7fb;
        }

        h1 {
            margin-bottom: 10px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            margin-bottom: 14px;
        }

        input[type="search"] {
            padding: 8px 10px;
            width: 260px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .bulk-actions {
            display: none;
            gap: 10px;
            justify-content: center;
        }

        .bulk-actions button {
            padding: 7px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
            transition: all 0.2s ease;
        }

        .bulk-actions button:hover {
            transform: translateY(-1px);
        }

        .btn-view {
            background: #2563eb;
            color: #fff;
        }

        .btn-download {
            background: #16a34a;
            color: #fff;
        }

        .btn-delete {
            background: #dc2626;
            color: #fff;
        }

        .page-info {
            text-align: right;
            font-size: 13px;
            color: #475569;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            background: #fff;
        }

        th,
        td {
            border: 1px solid #e2e8f0;
            padding: 8px;
            white-space: nowrap;
        }

        thead th {
            background: #f1f5f9;
            position: sticky;
            top: 0;
        }

        tbody tr:nth-child(even) {
            background: #fafafa;
        }

        .actions button {
            padding: 5px 8px;
            font-size: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            margin-right: 4px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        .actions button:disabled {
            background: #cbd5e1 !important;
            color: #64748b;
            cursor: not-allowed;
            box-shadow: none;
        }

        .pagination {
            margin-top: 14px;
            text-align: right;
        }

        .pagination button {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
        }

        .dashboard-back {
            position: fixed;
            bottom: 20px;
            left: 20px;
        }

        .dashboard-back button {
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            background: #0f172a;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .modal {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            width: 360px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            cursor: pointer;
            font-size: 18px;
        }

        .actions button:disabled {
            opacity: 0.45;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <h1>Invoices</h1>

    <div class="controls">
        <input type="search" id="searchBox" placeholder="Search invoice / client">

        <div class="bulk-actions" id="bulkActions">
            <button class="btn-view" onclick="bulkView()">View Selected</button>
            <button class="btn-download" onclick="bulkDownload()">Download Selected</button>
            <button class="btn-delete" onclick="confirmBulkDelete()">Delete Selected</button>
        </div>

        <div class="page-info" id="pageInfo"></div>
    </div>

    <table>
        <thead>
            <tr>
                <th><input type="checkbox" id="selectAll"></th>
                <th>Invoice No</th>
                <th>From</th>
                <th>Client</th>
                <th>Date</th>
                <th>Total</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="invoiceTable"></tbody>
    </table>

    <div class="pagination">
        <button onclick="prevPage()">Prev</button>
        <button onclick="nextPage()">Next</button>
    </div>

    <div class="dashboard-back">
        <button onclick="goDashboard()">← Go to Dashboard</button>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle"></h3>
                <span class="modal-close" onclick="closeModal()">✕</span>
            </div>
            <p id="modalMessage"></p><br>
            <button class="btn-delete" onclick="modalConfirm()">Confirm</button>
        </div>
    </div>

    <script>
        let invoices = [];
        let filtered = [];
        let currentPage = 1;
        const rowsPerPage = 25;
        let pendingDeleteIds = [];

        async function loadInvoices() {
            const res = await fetch("/api/invoices", { credentials: "include" });
            const data = await res.json();
            invoices = data.invoices;
            filtered = invoices;
            render();
        }

        function render() {
            const start = (currentPage - 1) * rowsPerPage;
            const pageData = filtered.slice(start, start + rowsPerPage);
            const tbody = document.getElementById("invoiceTable");
            tbody.innerHTML = "";

            pageData.forEach(inv => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
            <td><input type="checkbox" class="rowCheck" value="${inv.id}"></td>
            <td>${inv.invoice_number}</td>
            <td>${inv.from_name || "-"}</td>
            <td>${inv.client_name}</td>
            <td>${new Date(inv.invoice_date).toLocaleString()}</td>
            <td>${inv.currency_symbol} ${inv.total}</td>
            <td class="actions">
    <button class="btn-view" onclick="openInvoice(${inv.id})">Open</button>
    <button class="btn-download" onclick="downloadInvoice(${inv.id})">Download</button>
    <button class="btn-delete" onclick="confirmSingleDelete(${inv.id})">Delete</button>
</td>
        `;
                tbody.appendChild(tr);
            });

            updatePageInfo();
            bindCheckboxEvents();
            updateSelectionUI();
        }

        function updatePageInfo() {
            const totalPages = Math.ceil(filtered.length / rowsPerPage);
            document.getElementById("pageInfo").innerText =
                `Page ${currentPage} of ${totalPages}`;
        }

        function bindCheckboxEvents() {
            document.querySelectorAll(".rowCheck").forEach(cb =>
                cb.addEventListener("change", updateSelectionUI)
            );
        }

        function updateSelectionUI() {
            const selected = document.querySelectorAll(".rowCheck:checked").length;
            document.getElementById("bulkActions").style.display = selected > 1 ? "flex" : "none";

            document.querySelectorAll(".actions button").forEach(btn => {
                btn.disabled = selected > 1;
            });
        }

        document.getElementById("selectAll").addEventListener("change", e => {
            document.querySelectorAll(".rowCheck").forEach(cb => cb.checked = e.target.checked);
            updateSelectionUI();
        });

        function bulkView() {
            document.querySelectorAll(".rowCheck:checked").forEach(cb =>
                window.open(`/admin/invoice-preview.html?id=${cb.value}`, "_blank")
            );
        }

        function bulkDownload() {
            document.querySelectorAll(".rowCheck:checked").forEach(cb =>
                window.open(`/api/invoices/${cb.value}/pdf`, "_blank")
            );
        }

        function confirmSingleDelete(id) {
            pendingDeleteIds = [id];
            showModal("Delete Invoice", "Delete this invoice?");
        }

        function confirmBulkDelete() {
            pendingDeleteIds = [...document.querySelectorAll(".rowCheck:checked")].map(cb => cb.value);
            showModal("Delete Invoices", "Delete selected invoices?");
        }

        async function modalConfirm() {
            for (const id of pendingDeleteIds) {
                await fetch(`/api/invoices/${id}`, { method: "DELETE", credentials: "include" });
            }
            closeModal();
            loadInvoices();
        }

        function showModal(t, m) {
            document.getElementById("modalTitle").innerText = t;
            document.getElementById("modalMessage").innerText = m;
            document.getElementById("modal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
            pendingDeleteIds = [];
        }

        function nextPage() {
            if (currentPage * rowsPerPage < filtered.length) currentPage++, render();
        }

        function prevPage() {
            if (currentPage > 1) currentPage--, render();
        }

        function goDashboard() {
            window.location.href = "/admin/dashboard.html";
        }

        function openInvoice(id) {
            window.open(`/admin/invoice-preview.html?id=${id}`, "_blank");
        }

        function downloadInvoice(id) {
            window.open(`/api/invoices/${id}/pdf`, "_blank");
        }

        loadInvoices();
    </script>

</body>

</html>
