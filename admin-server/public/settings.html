<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/admin/css/admin-ui.css">
    <title>App Settings</title>

    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            background: #f5f7fb;
            font-family: Arial, sans-serif;
        }

        /* Sidebar */
        .sidebar {
            width: 200px;
            background: #ffffff;
            border-right: 1px solid #e2e8f0;
            padding: 18px;
        }

        .sidebar h2 {
            font-size: 16px;
            margin-bottom: 18px;
        }

        .sidebar button {
            width: 100%;
            padding: 9px 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            border: none;
            background: #f1f5f9;
            cursor: pointer;
            font-size: 13px;
            text-align: left;
        }

        .sidebar button:hover {
            background: #e0e7ff;
        }

        /* Content */
        .content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .settings-card {
            width: 100%;
            max-width: 720px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.18);
            padding: 30px;
        }

        /* Sections */
        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* Typography */
        h3 {
            margin-bottom: 14px;
            font-size: 17px;
            font-weight: 600;
            color: #1f2937;
        }

        h4 {
            margin-top: 22px;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
        }

        label {
            font-size: 13px;
            font-weight: 600;
        }

        /* Inputs */
        input,
        textarea {
            width: 100%;
            padding: 9px;
            margin: 6px 0 14px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
        }

        /* Password */
        .password-wrap {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 36px;
            cursor: pointer;
        }

        /* Currency table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 14px;
            font-size: 13px;
        }

        th {
            background: #f1f5f9;
            padding: 8px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 10px 8px;
        }

        td strong {
            font-weight: 700;
        }

        tbody tr:hover {
            background: #f8fafc;
        }

        /* Pagination */
        .pagination-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            font-size: 12px;
            color: #9ca3af;
        }

        .pagination-actions {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .pagination-actions button {
            width: 36px;
            aspect-ratio: 1 / 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;

            border-radius: 50%;
            border: none;
            background: #ffffff;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
            cursor: pointer;
            transition: transform 0.2s ease;

        }

        .pagination-actions button:hover {
            transform: translateY(-2px);
        }

        /* Profiles */
        .profile-card {
            display: flex;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .profile-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #e5e7eb;
            overflow: hidden;
            flex-shrink: 0;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info {
            font-size: 13px;
            color: #4b5563;
            line-height: 1.4;
        }

        .profile-info strong {
            display: block;
            font-size: 14px;
            color: #111827;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>⚙ App Settings</h2>
        <button onclick="showSection('password')">🔐 Change Password</button>
        <button onclick="showSection('currencies')">💱 Currencies</button>
        <button onclick="showSection('profiles')">🏢 Business Profiles</button>
        <hr>
        <button onclick="goBack()">⬅ Back to Dashboard</button>
    </div>

    <div class="content">
        <div class="settings-card">

            <!-- PASSWORD -->
            <div id="password" class="section active">
                <h3>🔐 Change Password</h3>

                <div class="password-wrap">
                    <label>Current Password</label>
                    <input type="password" id="currentPassword">
                    <span class="toggle-password" onclick="togglePwd(this,'currentPassword')">👁️‍🗨️</span>
                </div>

                <div class="password-wrap">
                    <label>New Password</label>
                    <input type="password" id="newPassword">
                    <span class="toggle-password" onclick="togglePwd(this,'newPassword')">👁️‍🗨️</span>
                </div>

                <div class="password-wrap">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPassword">
                    <span class="toggle-password" onclick="togglePwd(this,'confirmPassword')">👁️‍🗨️</span>
                </div>

                <button onclick="changePassword()">Update Password</button>
                <p id="passwordMsg"></p>
            </div>

            <!-- CURRENCIES -->
            <div id="currencies" class="section">
                <h3>💱 Manage Currencies</h3>

                <input type="text" id="curCode" placeholder="Code (INR)">
                <input type="text" id="curName" placeholder="Currency Name">
                <input type="text" id="curSymbol" placeholder="Symbol (₹)">
                <button onclick="addCurrency()">Add Currency</button>

                <!-- ORIGINAL SOURCE LIST -->
                <ul id="currencyList" style="display:none"></ul>

                <table>
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Name</th>
                            <th>Symbol</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="currencyTable"></tbody>
                </table>

                <div class="pagination-bar">
                    <span id="currencyPageInfo"></span>
                    <div class="pagination-actions">
                        <button onclick="prevCurrency()">⮜</button>
                        <button onclick="nextCurrency()">⮞</button>
                    </div>
                </div>
            </div>

            <!-- PROFILES -->
            <div id="profiles" class="section">
                <h3>🏢 Business Profiles</h3>

                <input type="hidden" id="bpId">
                <input type="text" id="bpName" placeholder="Business Name">
                <textarea id="bpAddress" placeholder="Address"></textarea>
                <input type="file" id="bpLogo">

                <button onclick="saveProfile()">Save Profile</button>
                <button onclick="resetProfileForm()">Cancel</button>

                <h4>Current Profiles:</h4>

                <!-- ORIGINAL SOURCE LIST -->
                <ul id="profileList" style="display:none"></ul>
                <div id="profileCards"></div>

                <div class="pagination-bar">
                    <span id="profilePageInfo"></span>
                    <div class="pagination-actions">
                        <button onclick="prevProfile()">⮜</button>
                        <button onclick="nextProfile()">⮞</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- ================= ORIGINAL WORKING JS (UNCHANGED) ================= -->
    <script>
        function showSection(id) {
            if (id === "currencies") loadCurrencies();
            if (id === "profiles") loadProfiles();
            document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
            document.getElementById(id).classList.add("active");
        }

        function goBack() {
            window.location.href = "/admin/dashboard.html";
        }

        async function changePassword() {
            const currentPassword = currentPassword.value;
            const newPassword = newPassword.value;
            const confirmPassword = confirmPassword.value;
            const msg = passwordMsg;

            msg.style.color = "red";

            if (!currentPassword || !newPassword || !confirmPassword) {
                msg.innerText = "All fields are required";
                return;
            }

            if (newPassword !== confirmPassword) {
                msg.innerText = "New passwords do not match";
                return;
            }

            const res = await fetch("/api/settings/change-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify({ currentPassword, newPassword })
            });

            const data = await res.json();

            if (res.ok) {
                msg.style.color = "green";
                msg.innerText = "Password updated successfully";
                currentPassword.value = newPassword.value = confirmPassword.value = "";
            } else {
                msg.innerText = data.message || "Failed to update password";
            }
        }

        async function loadCurrencies() {
            const res = await fetch("/api/currencies", { credentials: "include" });
            const data = await res.json();

            currencyList.innerHTML = "";

            // ✅ SORT BY NAME (A → Z)
            data.currencies
                .sort((a, b) => a.name.localeCompare(b.name))
                .forEach(c => {
                    const li = document.createElement("li");
                    li.innerHTML = `
                ${c.code} — ${c.name} (${c.symbol})
                <button onclick="confirmDeleteCurrency(${c.id})">Delete</button>
            `;
                    currencyList.appendChild(li);
                });
        }

        async function addCurrency() {
            const code = curCode.value.trim();
            const name = curName.value.trim();
            const symbol = curSymbol.value.trim();

            if (!code || !name || !symbol) {
                showModal("Error", "All fields are required");
                return;
            }

            const res = await fetch("/api/currencies", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify({ code, name, symbol })
            });

            const data = await res.json().catch(() => ({}));

            if (res.ok) {
                curCode.value = curName.value = curSymbol.value = "";
                loadCurrencies();
            } else {
                showModal(
                    "Error",
                    data.message || "Unable to add currency"
                );
            }
        }

        async function deleteCurrency(id) {
            if (!confirm("Remove this currency?")) return;
            await fetch(`/api/currencies/${id}`, { method: "DELETE", credentials: "include" });
            loadCurrencies();
        }

        let editingProfileId = null;

        async function loadProfiles() {
            const res = await fetch("/api/business-profiles", { credentials: "include" });
            const data = await res.json();
            profileList.innerHTML = "";

            data.profiles.forEach(p => {
                const li = document.createElement("li");
                li.innerHTML = `
            <strong>${p.name}</strong><br>
            ${p.address}<br>
            ${p.logo_path ? `<img src="${p.logo_path}" width="80"><br>` : ""}
            <button onclick="editProfile(${p.id}, '${escapeHtml(p.name)}', '${escapeHtml(p.address)}')">Edit</button>
            <button onclick="deleteProfile(${p.id})">Delete</button>`;
                profileList.appendChild(li);
            });
        }

        function editProfile(id, name, address) {
            editingProfileId = id;
            bpId.value = id;
            bpName.value = name;
            bpAddress.value = address;
        }

        function resetProfileForm() {
            editingProfileId = null;
            bpId.value = bpName.value = bpAddress.value = "";
            bpLogo.value = "";
        }

        let pendingDeleteCurrencyId = null;
        let pendingDeleteProfileId = null;

        function confirmDeleteCurrency(id) {
            pendingDeleteCurrencyId = id;
            showModal(
                "Confirm Delete",
                "Are you sure you want to delete this currency?",
                deleteCurrencyConfirmed
            );
        }

        function confirmDeleteProfile(id) {
            pendingDeleteProfileId = id;
            showModal(
                "Confirm Delete",
                "Are you sure you want to delete this business profile?",
                deleteProfileConfirmed
            );
        }

        async function saveProfile() {
            const name = bpName.value.trim();
            const address = bpAddress.value.trim();
            const logo = bpLogo.files[0];

            if (!name || !address) {
                showModal("Error", "Business name and address are required");
                return;
            }

            const fd = new FormData();
            fd.append("name", name);
            fd.append("address", address);
            if (logo) fd.append("logo", logo);

            let url = "/api/business-profiles";
            let method = "POST";

            if (editingProfileId) {
                url = `/api/business-profiles/${editingProfileId}`;
                method = "PUT";
            }

            const res = await fetch(url, {
                method,
                credentials: "include",
                body: fd
            });

            const data = await res.json().catch(() => ({}));

            if (res.ok) {
                resetProfileForm();
                loadProfiles();
            } else {
                showModal(
                    "Error",
                    data.message || "A business profile with this name already exists"
                );
            }
        }


        async function deleteProfile(id) {
            if (!confirm("Delete this profile?")) return;
            await fetch(`/api/business-profiles/${id}`, { method: "DELETE", credentials: "include" });
            loadProfiles();
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function showModal(title, message) {
            modalTitle.innerText = title;
            modalMessage.innerText = message;
            modal.style.display = "flex";
        }

        function closeModal() {
            modal.style.display = "none";
        }
    </script>

    <!-- ================= UI-ONLY PAGINATION ================= -->
    <script>
        function togglePwd(el, id) {
            const i = document.getElementById(id);
            if (i.type === "password") { i.type = "text"; el.textContent = "👁️"; }
            else { i.type = "password"; el.textContent = "👁️‍🗨️"; }
        }

        /* Currency pagination */
        let currencyPage = 0;
        const currencyPerPage = 10;

        function renderCurrencyUI() {
            const rows = [...currencyList.children];
            currencyTable.innerHTML = "";
            rows.slice(currencyPage * currencyPerPage, (currencyPage + 1) * currencyPerPage)
                .forEach(li => {
                    const txt = li.childNodes[0].textContent.trim();
                    const btn = li.querySelector("button");
                    const m = txt.match(/^(.+?)\s—\s(.+?)\s\((.+?)\)$/);
                    if (!m) return;
                    currencyTable.innerHTML += `
            <tr>
                <td>${m[1]}</td>
                <td>${m[2]}</td>
                <td><strong>${m[3]}</strong></td>
                <td>${btn.outerHTML}</td>
            </tr>`;
                });
            currencyPageInfo.innerText = `Page ${currencyPage + 1} of ${Math.max(1, Math.ceil(rows.length / currencyPerPage))}`;
        }

        const _loadCurrencies = loadCurrencies;
        loadCurrencies = async () => { await _loadCurrencies(); currencyPage = 0; renderCurrencyUI(); };
        function nextCurrency() { if ((currencyPage + 1) * currencyPerPage < currencyList.children.length) { currencyPage++; renderCurrencyUI(); } }
        function prevCurrency() { if (currencyPage > 0) { currencyPage--; renderCurrencyUI(); } }

        /* Profile pagination */
        let profilePage = 0;
        const profilePerPage = 5;

        function renderProfileUI() {
            const rows = [...profileList.children];
            profileCards.innerHTML = "";
            rows.slice(profilePage * profilePerPage, (profilePage + 1) * profilePerPage)
                .forEach(li => {
                    profileCards.innerHTML += `
            <div class="profile-card">
                <div class="profile-avatar">${li.querySelector("img")?.outerHTML || ""}</div>
                <div class="profile-info">${li.innerHTML}</div>
            </div>`;
                });
            profilePageInfo.innerText = `Page ${profilePage + 1} of ${Math.max(1, Math.ceil(rows.length / profilePerPage))}`;
        }

        const _loadProfiles = loadProfiles;
        loadProfiles = async () => { await _loadProfiles(); profilePage = 0; renderProfileUI(); };
        function nextProfile() { if ((profilePage + 1) * profilePerPage < profileList.children.length) { profilePage++; renderProfileUI(); } }
        function prevProfile() { if (profilePage > 0) { profilePage--; renderProfileUI(); } }
    </script>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle"></h3>
                <span class="modal-close" onclick="closeModal()">✕</span>
            </div>
            <p id="modalMessage"></p>
            <br>
            <button onclick="closeModal()">OK</button>
        </div>
    </div>

</body>

</html>
